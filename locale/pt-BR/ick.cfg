[mod-setting-description]
ick-automatic-mode=Os trens voltam ao modo automático quando o trabalho de reparo termina (fantasmas construídos, composição completa e reabastecimento se exigido).
ick-fuel-type=Se deixado em branco, o combustível destruído será solicitado.
ick-fuel-amount=Quanto encher do inventário de combustível, em porcentagem da capacidade (0–100). 100 solicita o inventário cheio (slots × tamanho da pilha).
ick-require-refuel=Quando ativo, o reparo só conclui depois que cada inventário de combustível atingir a porcentagem mínima. Agendamento/grupo são restaurados assim que a composição for reconstruída; só o modo automático espera o combustível. Enquanto espera combustível, o trem não é forçado de volta ao modo manual. Desative para concluir o reparo (incluindo automático) assim que a composição for reconstruída.
ick-refuel-percent=Cada inventário de combustível do trem deve estar pelo menos nesta porcentagem cheio (0–100%) antes de concluir. Só vale se a exigência de reabastecimento estiver ativa.


