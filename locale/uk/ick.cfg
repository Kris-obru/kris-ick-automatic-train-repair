[mod-setting-description]
ick-automatic-mode=Потяги знову переводяться в автоматичний режим після завершення ремонту (привиди збудовані, склад збігається, і за потреби виконано заправку).
ick-fuel-type=Якщо залишиться порожнім, буде вимагатися знищене паливо.
ick-fuel-amount=Наскільки заповнювати паливний інвентар у відсотках ємності (0–100). 100 — повний інвентар (кількість слотів × розмір стопки).
ick-require-refuel=Поки увімкнено, ремонт не завершується, доки кожен паливний інвентар не досягне мінімального відсотка. Розклад/група відновлюються одразу після збирання складу; лише авторежим чекає на заправку. Під час очікування палива потяг не примусово повертається в ручний режим. Вимкніть, щоб завершувати ремонт (включно з авторежимом) одразу після збирання складу.
ick-refuel-percent=Кожен паливний інвентар потяга має бути заповнений щонайменше на цей відсоток (0–100%) перед завершенням ремонту. Враховується лише за увімкненої вимоги заправки.


