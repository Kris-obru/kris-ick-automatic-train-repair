[mod-setting-description]
ick-automatic-mode=Trains will be set to automatic mode again as soon as the repair job completes (ghosts built, consist matches, and refuel requirement if enabled).
ick-fuel-type=If left empty the destroyed fuel type(s) will be requested.
ick-fuel-amount=How full to request the fuel inventory, as a percent of capacity (0–100). 100 requests a full fuel inventory (slot count × stack size).
ick-require-refuel=When enabled, the repair job stays open until every fuel-bearing carriage meets the minimum fill percent. Schedule/group are restored as soon as the consist is rebuilt; only automatic mode waits for fuel. While waiting for fuel, the train is not forced back to manual — player automatic/manual changes are respected. Disable to finish (including automatic) as soon as the consist is rebuilt.
ick-refuel-percent=Each burner fuel inventory on the train must be at least this full (0–100%) before the repair job completes. Only used when "Require refueling before repair job completes" is enabled.


