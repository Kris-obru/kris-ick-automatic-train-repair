[mod-setting-description]
ick-automatic-mode=Züge werden wieder in den Automatikmodus versetzt, sobald der Reparaturauftrag abgeschlossen ist (Geister gebaut, Zug vollständig, und ggf. Auftank-Anforderung erfüllt).
ick-fuel-type=Wenn leer gelassen, wird der zerstörte Kraftstoff angefordert.
ick-fuel-amount=Wie voll das Kraftstoffinventar angefordert wird, in Prozent der Kapazität (0–100). 100 = volles Inventar (Slotanzahl × Stapelgröße).
ick-require-refuel=Wenn aktiv, bleibt der Reparaturauftrag offen, bis jedes Brennstoffinventar den Mindest-Füllstand erreicht. Fahrplan/Gruppe werden wiederhergestellt, sobald der Zug vollständig ist; nur der Automatikmodus wartet auf Kraftstoff. Während der Wartezeit wird der Zug nicht erneut auf manuell gezwungen. Deaktivieren, um den Auftrag (inkl. Automatik) sofort nach dem Wiederaufbau abzuschließen.
ick-refuel-percent=Jedes Brenner-Kraftstoffinventar am Zug muss mindestens so voll sein (0–100%), bevor der Reparaturauftrag abschließt. Nur relevant, wenn „Auftanken vor Abschluss…“ aktiv ist.


