[mod-setting-description]
ick-automatic-mode=Поезда снова переводятся в автоматический режим после завершения ремонта (призраки построены, состав совпадает, и при необходимости выполнена заправка).
ick-fuel-type=Если оставить пустым, то будет запрошено уничтоженное топливо.
ick-fuel-amount=Насколько заполнять топливный инвентарь в процентах ёмкости (0–100). 100 — полный инвентарь (число слотов × размер стопки).
ick-require-refuel=Пока включено, ремонт не завершается, пока каждый топливный инвентарь не достигнет минимального процента. Расписание/группа восстанавливаются сразу после сборки состава; только авторежим ждёт заправки. Во время ожидания топлива поезд не принудительно возвращается в ручной режим. Отключите, чтобы завершать ремонт (включая авторежим) сразу после сборки состава.
ick-refuel-percent=Каждый топливный инвентарь поезда должен быть заполнен не менее чем на этот процент (0–100%) перед завершением ремонта. Учитывается только при включённом требовании заправки.


